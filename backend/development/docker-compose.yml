version: "3.9"

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      # OTLP gRPC ingest
      - "4317:4317"
      # OTLP HTTP ingest
      - "4318:4318"
      # Jaeger UI / query
      - "16686:16686"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: homehub
      POSTGRES_USER: homehub
      POSTGRES_PASSWORD: homehub
    ports:
      - "5432:5432"
    volumes:
      - homehub-postgres-data:/var/lib/postgresql/data

  webapi:
    build:
      context: ..
      dockerfile: WebAPI/Dockerfile
    container_name: webapi
    depends_on:
      - jaeger
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__ServiceName: DotNetStarterKit.WebAPI
      OpenTelemetry__Otlp__Endpoint: http://jaeger:4317
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=homehub;Username=homehub;Password=homehub"
    ports:
      - "8080:8080"

volumes:
  homehub-postgres-data:
    driver: local
